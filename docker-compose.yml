version: '3.8'

services:
  satellite-sim:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: satellite-sim
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/satellite_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - satellite-network

  mysql:
    image: mysql:8.0
    container_name: satellite-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=satellite_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql:ro
      - ./src/main/resources/data.sql:/docker-entrypoint-initdb.d/2-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - satellite-network

  redis:
    image: redis:7-alpine
    container_name: satellite-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - satellite-network

volumes:
  mysql_data:
  redis_data:

networks:
  satellite-network:
    driver: bridge

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证 | 天舟任务控制中心</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div id="app" class="login-wrapper">
    
    <div class="noise-overlay"></div>

    <div class="nebula-bg"></div>

    <div class="login-card">
        <div class="card-decor-top"></div>
        
        <div class="login-header text-center">
            <div class="logo-glow mb-3">
                <i class="bi bi-rocket-takeoff-fill"></i>
            </div>
            <h2 class="brand-title">天舟系统 <span class="text-thin">接入终端</span></h2>
            <div class="text-sub num-font mt-1" style="opacity: 0.6; letter-spacing: 1px;">SKY-SAT SECURE ACCESS V7.5</div>
        </div>

        <div class="system-check my-4">
            <div class="check-item" :class="{ 'done': step > 0 }">
                <span>> 加密链路完整性校验</span>
                <span class="status num-font">{{ step > 0 ? 'OK' : '...' }}</span>
            </div>
            <div class="check-item" :class="{ 'done': step > 1 }">
                <span>> 卫星遥测信号锁定</span>
                <span class="status num-font">{{ step > 1 ? 'LOCKED' : '...' }}</span>
            </div>
            <div class="check-item" :class="{ 'done': step > 2 }">
                <span>> 操作员权限数据库</span>
                <span class="status num-font">{{ step > 2 ? 'SYNCED' : '...' }}</span>
            </div>
        </div>

        <form @submit.prevent="handleLogin" class="login-form">
            
            <div class="input-group-cyber mb-3" :class="{ 'focused': focusedField === 'user' }">
                <div class="icon-box"><i class="bi bi-person-badge"></i></div>
                <input type="text" v-model="form.username" 
                       placeholder="请输入操作员编号 / ID" 
                       @focus="focusedField = 'user'" 
                       @blur="focusedField = null"
                       autocomplete="off"
                       required>
                <div class="scan-line"></div>
            </div>

            <div class="input-group-cyber mb-4" :class="{ 'focused': focusedField === 'pass' }">
                <div class="icon-box"><i class="bi bi-shield-lock-fill"></i></div>
                <input type="password" v-model="form.password" 
                       placeholder="访问密钥 / ACCESS KEY" 
                       @focus="focusedField = 'pass'" 
                       @blur="focusedField = null"
                       required>
                <div class="scan-line"></div>
            </div>

            <button type="submit" class="btn-cyber-submit" :disabled="loading || step < 3">
                <span v-if="!loading" class="d-flex align-items-center justify-content-center gap-2">
                    建立安全会话 <i class="bi bi-arrow-right-circle"></i>
                </span>
                <span v-else class="d-flex align-items-center justify-content-center">
                    <span class="spinner-border spinner-border-sm me-2" role="status" style="border-width: 2px;"></span>
                    身份核验中...
                </span>
            </button>

            <div class="error-msg text-center mt-3" v-if="errorMsg">
                <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ errorMsg }}
            </div>
        </form>

        <div class="login-footer">
            <div class="d-flex justify-content-between text-sub small num-font" style="opacity: 0.5;">
                <span>节点: CN-NORTH-1</span>
                <span>网络: 加密保护 (SECURE)</span>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, onMounted } = Vue;

createApp({
    setup() {
        const form = ref({ username: '', password: '' });
        const loading = ref(false);
        const errorMsg = ref('');
        const focusedField = ref(null);
        const step = ref(0);

        onMounted(() => {
            // 模拟自检流程
            setTimeout(() => step.value = 1, 600);
            setTimeout(() => step.value = 2, 1400);
            setTimeout(() => step.value = 3, 2200);
        });

        const handleLogin = () => {
            loading.value = true;
            errorMsg.value = '';

            setTimeout(() => {
                if (form.value.username && form.value.password) {
                    // 登录成功跳转
                    window.location.href = 'test.html'; 
                } else {
                    loading.value = false;
                    errorMsg.value = '错误：无效的凭证或权限不足';
                }
            }, 1500);
        };

        return { form, loading, errorMsg, focusedField, step, handleLogin };
    }
}).mount('#app');
</script>
</body>
</html>
